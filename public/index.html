<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>챈나룽 생존 랭킹</title>
<link rel="stylesheet" href="style.css?v=10">
</head>

<body>

<div id="loadingScreen" class="loading-screen">
    <div class="loading-logo">CHANNARUNG</div>
    <div class="loading-text">잠시만 기다려주세요.</div>
</div>

<button id="topButton" class="top-button" title="맨 위로"></button>

<div class="page">

    <header class="hero">
        <div class="hero-kicker">SOOP LIVE EVENT</div>
        <h1>챈나룽 생존 랭킹</h1>
        <p>좋아요 UP 기준 실시간 참가자 순위</p>
    </header>

    <main class="board">

        <div class="tab-box">
            <button id="rankingTab" class="tab-btn active-tab" type="button">실시간 랭킹</button>
            <button id="freepassTab" class="tab-btn" type="button">프리패스</button>
            <button id="serverInfoTab" class="tab-btn" type="button">서버 정보</button>
        </div>

        <div class="search-box">
            <input id="searchInput" type="text" placeholder="닉네임 / 아이디 검색">
        </div>

        <section id="cutlinePanel" class="cutline-panel">
            <div class="cutline-title">SURVIVAL CUTLINE</div>

            <div class="cutline-grid">
                <div class="cutline-card safe">
                    <span>111위 생존권</span>
                    <strong id="safeUser">불러오는 중...</strong>
                </div>

                <div class="cutline-card danger">
                    <span>112위 탈락권</span>
                    <strong id="dangerUser">불러오는 중...</strong>
                </div>
            </div>

            <div id="gapText" class="gap-text">UP 차이 계산 중...</div>
        </section>

        <div id="updateInfo" class="update-info">불러오는 중...</div>

        <section id="rankingList" class="ranking-list"></section>

        <section id="serverInfoView" class="server-info-view" style="display:none;">
            <div class="poster-wrapper">
                <img src="./images/channarung.png" class="poster-image" alt="챈나룽 서버 이미지">
            </div>

            <div class="info-card">
                <h2>지옥의 초대장</h2>
                <p>
                    인세와 지옥의 경계가 무너진 순간, 살아남기 위한 참가자들의 경쟁이 시작된다.
                    <br><br>
                    이 페이지는 SOOP 신청 댓글의 좋아요 수를 실시간으로 집계하여 생존 순위를 표시합니다.
                    <br><br>
                    참가자 카드를 누르면 원본 게시글로 이동합니다.
                </p>
            </div>
        </section>

    </main>
</div>

<script>
const loadingScreen = document.getElementById("loadingScreen");
const rankingList = document.getElementById("rankingList");
const searchInput = document.getElementById("searchInput");
const updateInfo = document.getElementById("updateInfo");

const rankingTab = document.getElementById("rankingTab");
const freepassTab = document.getElementById("freepassTab");
const serverInfoTab = document.getElementById("serverInfoTab");

const cutlinePanel = document.getElementById("cutlinePanel");
const serverInfoView = document.getElementById("serverInfoView");

const safeUser = document.getElementById("safeUser");
const dangerUser = document.getElementById("dangerUser");
const gapText = document.getElementById("gapText");

const topButton = document.getElementById("topButton");

let rankingData = [];
let currentView = "ranking";
let firstLoaded = false;

const CUTLINE_RANK = 111;

const FREE_PASS_USERS = [
    "ldrboo",
    "khm11903",
    "qn308dud",
    "iamquaddurup",
    "dlghfjs",
    "jrdart",
    "roket0829",
    "whatcherry4",
    "chaenna02",
    "singgyul",
    "kymakyma"
];

rankingTab.addEventListener("click", () => {
    currentView = "ranking";
    setActiveTab();
    renderRanking();
});

freepassTab.addEventListener("click", () => {
    currentView = "freepass";
    setActiveTab();
    renderRanking();
});

serverInfoTab.addEventListener("click", () => {
    currentView = "server";
    setActiveTab();
    renderRanking();
});

cutlinePanel.addEventListener("click", () => {
    currentView = "ranking";
    searchInput.value = "";
    setActiveTab();
    renderRanking();

    setTimeout(scrollToCutline, 150);
});

topButton.addEventListener("click", () => {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});

window.addEventListener("scroll", () => {
    if (window.scrollY > 400) {
        topButton.classList.add("show-top-button");
    } else {
        topButton.classList.remove("show-top-button");
    }
});

function setActiveTab() {
    rankingTab.classList.toggle("active-tab", currentView === "ranking");
    freepassTab.classList.toggle("active-tab", currentView === "freepass");
    serverInfoTab.classList.toggle("active-tab", currentView === "server");
}

async function loadRanking() {
    try {
        const res = await fetch("/api/ranking");

        if (!res.ok) {
            throw new Error("API 응답 실패");
        }

        rankingData = await res.json();
        renderRanking();

        if (!firstLoaded) {
            firstLoaded = true;
            setTimeout(() => {
                loadingScreen.classList.add("hide-loading");
            }, 400);
        }

    } catch (err) {
        console.error(err);
        updateInfo.innerText = "실시간 랭킹을 불러오지 못했습니다.";
        loadingScreen.classList.add("hide-loading");
    }
}

function renderRanking() {
    rankingList.innerHTML = "";

    const keyword = searchInput.value.toLowerCase();

    const freepassUsers = rankingData.filter(user =>
        FREE_PASS_USERS.includes(String(user.userId || "").toLowerCase())
    );

    const normalUsers = rankingData.filter(user =>
        !FREE_PASS_USERS.includes(String(user.userId || "").toLowerCase())
    );

    if (currentView === "server") {
        searchInput.style.display = "none";
        cutlinePanel.style.display = "none";
        updateInfo.style.display = "none";
        rankingList.style.display = "none";
        serverInfoView.style.display = "block";
        return;
    }

    searchInput.style.display = "block";
    updateInfo.style.display = "block";
    rankingList.style.display = "block";
    serverInfoView.style.display = "none";

    cutlinePanel.style.display =
        currentView === "ranking" ? "block" : "none";

    const targetUsers =
        currentView === "freepass" ? freepassUsers : normalUsers;

    const reRankedUsers = targetUsers.map((user, index) => ({
        ...user,
        displayRank: index + 1
    }));

    if (currentView === "ranking") {
        updateCutlinePanel(normalUsers);
    }

    const filtered = reRankedUsers.filter(user =>
        String(user.nickname || "").toLowerCase().includes(keyword) ||
        String(user.userId || "").toLowerCase().includes(keyword)
    );

    updateInfo.innerText =
        currentView === "freepass"
            ? `프리패스 인원 ${freepassUsers.length}명 | 마지막 업데이트: ${new Date().toLocaleString("ko-KR")}`
            : `총 ${rankingData.length}개 댓글 | 랭킹 반영 ${normalUsers.length}명 | 프리패스 ${freepassUsers.length}명 제외 | 마지막 업데이트: ${new Date().toLocaleString("ko-KR")}`;

    if (filtered.length === 0) {
        rankingList.innerHTML =
            `<div class="empty">${
                currentView === "freepass"
                    ? "프리패스 인원이 없습니다."
                    : "검색 결과가 없습니다."
            }</div>`;
        return;
    }

    filtered.forEach(user => {
        if (
            currentView === "ranking" &&
            user.displayRank === CUTLINE_RANK + 1
        ) {
            const divider = document.createElement("div");
            divider.className = "cutline-divider";
            divider.innerText = "111위까지 생존";
            rankingList.appendChild(divider);
        }

        const card = document.createElement("article");

        let className = "rank-card";

        if (user.displayRank === 1) className += " top1";
        if (user.displayRank === 2) className += " top2";
        if (user.displayRank === 3) className += " top3";

        if (currentView === "ranking") {
            if (user.displayRank === CUTLINE_RANK) {
                className += " cutline-safe-card";
                card.id = "cutlineSafeCard";
            }

            if (user.displayRank === CUTLINE_RANK + 1) {
                className += " cutline-danger-card";
                card.id = "cutlineDangerCard";
            }

            if (
                user.displayRank >= CUTLINE_RANK - 3 &&
                user.displayRank <= CUTLINE_RANK + 4
            ) {
                className += " cutline-zone";
            }
        }

        card.className = className;

        let movementText = "─ 유지";

        if (user.movement === "up") {
            movementText = `▲ ${user.rankDiff}계단 상승`;
        }

        if (user.movement === "down") {
            movementText = `▼ ${user.rankDiff}계단 하락`;
        }

        let statusText = "";

        if (currentView === "ranking" && user.displayRank === CUTLINE_RANK) {
            statusText = `<div class="status safe-status">생존권 마지막 자리</div>`;
        }

        if (currentView === "ranking" && user.displayRank === CUTLINE_RANK + 1) {
            statusText = `<div class="status danger-status">탈락권 첫 번째</div>`;
        }

        let likeDiffText = "";

        if (user.likeDiff > 0) {
            likeDiffText = `<div class="like-diff">+${user.likeDiff} UP</div>`;
        }

        card.innerHTML = `
            <a class="rank-link" href="${user.link}" target="_blank"></a>

            <div class="rank-left">
                <div class="rank-number">${user.displayRank}</div>

                <img
                    class="profile-image"
                    src="${user.profileImage || ""}"
                    alt=""
                    onerror="this.style.display='none'"
                >

                <div class="user-text">
                    <div class="nickname">${escapeHtml(user.nickname)}</div>
                    <div class="user-id">@${escapeHtml(user.userId)}</div>
                    <div class="movement ${user.movement}">${movementText}</div>
                    ${statusText}
                    ${likeDiffText}
                </div>
            </div>

            <div class="rank-right">
                <div class="up-label">UP</div>
                <div class="up-count ${user.upDiff !== 0 ? "up-changed" : ""} ${user.upDiff > 0 ? "up-plus" : ""} ${user.upDiff < 0 ? "up-minus" : ""}">
                    ${user.up}
                </div>
            </div>
        `;

        rankingList.appendChild(card);
    });
}

function scrollToCutline() {
    const target =
        document.getElementById("cutlineSafeCard") ||
        document.getElementById("cutlineDangerCard");

    if (!target) {
        alert("아직 111등/112등 컷라인이 형성되지 않았습니다.");
        return;
    }

    const targetY =
        window.scrollY +
        target.getBoundingClientRect().top -
        120;

    window.scrollTo({
        top: targetY,
        behavior: "smooth"
    });

    target.classList.add("cutline-flash");

    setTimeout(() => {
        target.classList.remove("cutline-flash");
    }, 1800);
}

function updateCutlinePanel(normalUsers) {
    const ranked = normalUsers.map((user, index) => ({
        ...user,
        displayRank: index + 1
    }));

    const safe = ranked[CUTLINE_RANK - 1];
    const danger = ranked[CUTLINE_RANK];

    if (!safe) {
        safeUser.innerText = "아직 111명 미만";
        dangerUser.innerText = "-";
        gapText.innerText = "컷라인이 아직 형성되지 않았습니다.";
        return;
    }

    safeUser.innerText = `${safe.nickname} · ${safe.up} UP`;

    if (!danger) {
        dangerUser.innerText = "112위 없음";
        gapText.innerText = "현재 전원 생존권입니다.";
        return;
    }

    dangerUser.innerText = `${danger.nickname} · ${danger.up} UP`;

    const gap = safe.up - danger.up;

    gapText.innerText =
        gap === 0
            ? "111위와 112위가 동점입니다."
            : `생존권과 탈락권 차이: ${gap} UP`;
}

function escapeHtml(text) {
    return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

searchInput.addEventListener("input", renderRanking);

loadRanking();
setInterval(loadRanking, 20000);
</script>

</body>
</html>
