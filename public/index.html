<!-- public/index.html -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>챈나룽 실시간 UP 순위</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
    background:
        radial-gradient(circle at top, #3a145f 0%, #140019 45%, #07000c 100%);
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(180,0,255,0.18), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(130,0,255,0.15), transparent 35%);
    pointer-events: none;
}

.container {
    width: 100%;
    max-width: 1450px;
    margin: auto;
    padding: 40px 24px;
}

.header {
    margin-bottom: 35px;
}

.title {
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(90deg, #ffffff, #c67dff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
}

.sub {
    margin-top: 14px;
    text-align: center;
    color: #cfc2da;
    font-size: 18px;
}

.layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
}

.left-panel {
    flex: 1;
}

.poster-wrapper {
    width: 100%;
    max-height: 85vh;
    overflow: hidden;
    border-radius: 30px;
    border: 1px solid rgba(180,0,255,0.25);
    background: rgba(15,5,25,0.9);
    box-shadow:
        0 0 35px rgba(160,0,255,0.18),
        inset 0 0 20px rgba(160,0,255,0.08);
    margin-bottom: 25px;
}

.poster-image {
    width: 100%;
    max-height: 85vh;
    object-fit: contain;
    display: block;
}

.info-card {
    background:
        linear-gradient(180deg, rgba(33,10,48,0.9), rgba(15,5,25,0.95));
    border: 1px solid rgba(183,0,255,0.25);
    border-radius: 28px;
    padding: 34px;
    box-shadow:
        0 0 25px rgba(155,0,255,0.18),
        inset 0 0 20px rgba(140,0,255,0.06);
}

.info-card h2 {
    font-size: 34px;
    margin-bottom: 20px;
    color: #dfb5ff;
}

.info-card p {
    line-height: 1.9;
    color: #d4c4df;
    font-size: 17px;
}

.right-panel {
    width: 470px;
    position: sticky;
    top: 24px;
}

.search-box {
    margin-bottom: 18px;
}

.search-box input {
    width: 100%;
    background: rgba(20,8,35,0.95);
    border: 1px solid rgba(170,0,255,0.25);
    border-radius: 18px;
    padding: 18px;
    color: white;
    font-size: 16px;
    outline: none;
}

.ranking-box {
    max-height: 82vh;
    overflow-y: auto;
    background:
        linear-gradient(180deg, rgba(28,10,45,0.95), rgba(10,4,20,0.96));
    border-radius: 30px;
    padding: 26px;
    border: 1px solid rgba(180,0,255,0.25);
    box-shadow:
        0 0 30px rgba(155,0,255,0.15),
        inset 0 0 15px rgba(155,0,255,0.05);
}

.ranking-title {
    text-align: center;
    font-size: 30px;
    font-weight: 800;
    margin-bottom: 12px;
    color: #efddff;
}

.update-info {
    text-align: center;
    color: #cfc2da;
    font-size: 13px;
    margin-bottom: 20px;
}

.rank-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px;
    margin-bottom: 16px;
    border-radius: 22px;
    background:
        linear-gradient(135deg, rgba(45,18,70,0.92), rgba(18,8,30,0.96));
    border: 1px solid rgba(200,120,255,0.12);
    transition: 0.25s;
}

.rank-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 0 22px rgba(170,0,255,0.25);
}

.top1 {
    border: 1px solid #ffe082;
    box-shadow: 0 0 20px rgba(255,208,0,0.2);
}

.top2 {
    border: 1px solid #d8d8d8;
}

.top3 {
    border: 1px solid #c7834b;
}

.rank-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.rank-number {
    width: 56px;
    height: 56px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
        linear-gradient(135deg, #6b1ea9, #2a083d);
    font-size: 22px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
}

.profile-image {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(200,120,255,0.5);
    box-shadow: 0 0 16px rgba(170,0,255,0.28);
    background: rgba(20,8,35,0.95);
    flex-shrink: 0;
}

.nickname {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 6px;
}

.user-id {
    margin-top: 3px;
    font-size: 13px;
    color: #bfa6d9;
}

.movement {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 700;
}

.up {
    color: #7dffb5;
}

.down {
    color: #ff8585;
}

.same {
    color: #c6b9d8;
}

.rank-right {
    text-align: right;
}

.up-count {
    font-size: 28px;
    font-weight: 900;
    color: #f2dcff;
}

.vote-btn {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    background:
        linear-gradient(135deg, #9c27ff, #5b1392);
    padding: 10px 16px;
    border-radius: 14px;
    color: white;
    font-size: 14px;
    font-weight: 700;
}

.empty {
    color: #cfc2da;
    text-align: center;
    padding: 30px 0;
}

@media(max-width: 1100px) {
    .layout {
        flex-direction: column;
    }

    .right-panel {
        width: 100%;
        position: static;
    }

    .ranking-box {
        max-height: none;
    }
}

@media(max-width: 650px) {
    .container {
        padding: 26px 14px;
    }

    .title {
        font-size: 34px;
    }

    .sub {
        font-size: 15px;
    }

    .rank-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
    }

    .rank-right {
        width: 100%;
        text-align: left;
    }

    .poster-wrapper {
        max-height: 60vh;
        border-radius: 22px;
    }

    .poster-image {
        max-height: 60vh;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">챈나룽 실시간 UP 순위</div>
        <div class="sub">SOOP 참가 신청 댓글 좋아요 순위를 실시간으로 확인하세요</div>
    </div>

    <div class="layout">

        <div class="left-panel">
            <div class="poster-wrapper">
                <img
                    src="./images/channarung.png"
                    class="poster-image"
                    alt="챈나룽 서버 이미지"
                >
            </div>

            <div class="info-card">
                <h2>지옥의 초대장</h2>
                <p>
                    인세와 지옥의 경계가 무너진 순간,
                    살아남기 위한 참가자들의 경쟁이 시작된다.
                    <br><br>
                    이 사이트는 SOOP 신청 댓글의 좋아요 수(UP)를
                    실시간으로 집계하여 순위를 표시합니다.
                    <br><br>
                    참가자를 클릭하면 바로 SOOP 원본 게시글로 이동할 수 있습니다.
                </p>
            </div>
        </div>

        <div class="right-panel">

            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="닉네임 / 아이디 검색..."
                >
            </div>

            <div class="ranking-box">
                <div class="ranking-title">👑 실시간 랭킹</div>
                <div class="update-info" id="updateInfo">불러오는 중...</div>
                <div id="rankingList"></div>
            </div>

        </div>

    </div>

</div>

<script>
const rankingList = document.getElementById("rankingList");
const searchInput = document.getElementById("searchInput");
const updateInfo = document.getElementById("updateInfo");

let rankingData = [];

async function loadRanking() {
    try {
        const res = await fetch("/api/ranking");

        if (!res.ok) {
            throw new Error("API 응답 실패");
        }

        rankingData = await res.json();

        updateInfo.innerText =
            `총 ${rankingData.length}개 댓글 | 마지막 업데이트: ${new Date().toLocaleString("ko-KR")}`;

        renderRanking();

    } catch (err) {
        console.error(err);
        updateInfo.innerText = "실시간 랭킹을 불러오지 못했습니다.";
    }
}

function renderRanking() {
    rankingList.innerHTML = "";

    const keyword = searchInput.value.toLowerCase();

    const filtered = rankingData.filter(user =>
        String(user.nickname || "").toLowerCase().includes(keyword) ||
        String(user.userId || "").toLowerCase().includes(keyword)
    );

    if (filtered.length === 0) {
        rankingList.innerHTML =
            `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
    }

    filtered.forEach(user => {
        const card = document.createElement("div");

        let topClass = "";

        if (user.rank === 1) topClass = "top1";
        if (user.rank === 2) topClass = "top2";
        if (user.rank === 3) topClass = "top3";

        card.className = `rank-card ${topClass}`;

        let movementText = "─ 유지";

        if (user.movement === "up") {
            movementText = `▲ ${user.rankDiff}계단 상승`;
        }

        if (user.movement === "down") {
            movementText = `▼ ${user.rankDiff}계단 하락`;
        }

        let likeDiffText = "";

        if (user.likeDiff > 0) {
            likeDiffText = `<div class="user-id">+${user.likeDiff} UP 증가</div>`;
        }

        card.innerHTML = `
            <div class="rank-left">

                <div class="rank-number">
                    ${user.rank}
                </div>

                <img
                    class="profile-image"
                    src="${user.profileImage || ""}"
                    alt="${escapeHtml(user.nickname)} 프로필"
                    onerror="this.style.display='none'"
                >

                <div>
                    <div class="nickname">
                        ${escapeHtml(user.nickname)}
                    </div>

                    <div class="user-id">
                        @${escapeHtml(user.userId)}
                    </div>

                    <div class="movement ${user.movement}">
                        ${movementText}
                    </div>

                    ${likeDiffText}
                </div>

            </div>

            <div class="rank-right">
                <div class="up-count">
                    👍 ${user.up}
                </div>

                <a
                    href="${user.link}"
                    target="_blank"
                    class="vote-btn"
                >
                    원본 보기
                </a>
            </div>
        `;

        rankingList.appendChild(card);
    });
}

function escapeHtml(text) {
    return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

searchInput.addEventListener("input", renderRanking);

loadRanking();
setInterval(loadRanking, 10000);
</script>

</body>
</html>
